{% if activity %}
<ul class="divide-y divide-gray-100 max-h-72 overflow-y-auto">
  {% for a in activity %}
  <li class="px-4 py-2 flex items-start gap-3 text-xs">
    <span class="text-[10px] font-mono text-gray-400 whitespace-nowrap pt-0.5">{{ a.time }}</span>
    <span class="text-gray-700 leading-snug">{{ a.summary }}</span>
  </li>
  {% endfor %}
</ul>
{% else %}
<div class="px-4 py-6 text-center text-xs text-gray-400">No recent activity</div>
{% endif %}
